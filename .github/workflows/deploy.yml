name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Firebase Service Account
        run: |
          echo '${{ secrets.PROD_FIREBASE_SERVICE_ACCOUNT_KEY }}' | base64 -d > firebase-service-account.json

      - name: Create production environment file
        run: |
          cat > .env.production.local << 'EOF'
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.PROD_NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PROD_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PROD_NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PROD_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PROD_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.PROD_NEXT_PUBLIC_FIREBASE_APP_ID }}
          FIREBASE_PROJECT_ID=${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          NEXTAUTH_SECRET=${{ secrets.PROD_NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.PROD_NEXTAUTH_URL }}
          EOF

      - name: Build Next.js app
        run: npm run build

      - name: Clean up Next.js build artifacts
        run: find .next -type d -name "*.body" -exec rm -rf {} + 2>/dev/null || true

      - name: Install Firebase CLI (stable version)
        run: npm install -g firebase-tools@12.9.1

      - name: Enable webframeworks experiment
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./firebase-service-account.json
        run: firebase experiments:enable webframeworks --project tumbahub-prod

      - name: Verify service account
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./firebase-service-account.json
        run: firebase projects:list

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./firebase-service-account.json
        run: |
          firebase deploy \
            --project tumbahub-prod \
            --only hosting \
            --non-interactive
